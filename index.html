<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ray Lunardon — Work in progress</title>
<meta name="description" content="Il nuovo sito è in costruzione. Online a breve.">
<style>
  :root{
    --bg:#0a0a0b;
    --line:rgba(255,255,255,.045);
    --fg:#ffffff;
    --muted:#8c8f96;
    --faint:#5a5d63;
    --accent:#4ade80;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%}
  body{
    font-family:"Helvetica Neue",Helvetica,Arial,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    background:var(--bg);
    color:var(--fg);
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    text-align:center;
    padding:40px 24px;
    position:relative;
    overflow:hidden;
  }
  /* subtle grid */
  body::before{
    content:"";
    position:absolute;
    inset:0;
    background-image:
      linear-gradient(var(--line) 1px,transparent 1px),
      linear-gradient(90deg,var(--line) 1px,transparent 1px);
    background-size:120px 120px;
    mask-image:radial-gradient(circle at 50% 45%,#000 55%,transparent 100%);
    -webkit-mask-image:radial-gradient(circle at 50% 45%,#000 55%,transparent 100%);
    pointer-events:none;
  }

  .wrap{position:relative;z-index:1;max-width:1100px;width:100%;
    animation:fade 1s ease both;}
  @keyframes fade{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}

  /* top eyebrow with flanking rules */
  .eyebrow{
    display:flex;align-items:center;justify-content:center;gap:14px;
    font-size:13px;letter-spacing:.42em;color:var(--muted);
    text-transform:uppercase;margin-bottom:34px;padding-left:.42em;
  }
  .eyebrow::before,.eyebrow::after{
    content:"";height:1px;width:120px;max-width:22vw;
    background:rgba(255,255,255,.14);
  }

  h1{
    font-weight:800;
    text-transform:uppercase;
    letter-spacing:-.015em;
    line-height:.92;
    font-size:clamp(48px,13vw,168px);
    margin:0;
  }

  .role{
    margin-top:34px;
    font-size:clamp(16px,3vw,30px);
    font-weight:400;
    color:var(--muted);
    letter-spacing:.005em;
  }
  .role .sep{color:var(--faint);margin:0 .5em}

  .divider{
    height:1px;width:min(560px,80%);
    background:rgba(255,255,255,.12);
    margin:30px auto 26px;
  }

  .status{
    display:inline-flex;align-items:center;gap:11px;
    font-size:13px;letter-spacing:.34em;text-transform:uppercase;
    color:var(--faint);padding-left:.34em;
  }
  .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
    box-shadow:0 0 0 0 rgba(74,222,128,.6);animation:pulse 2.2s infinite;}
  @keyframes pulse{
    0%{box-shadow:0 0 0 0 rgba(74,222,128,.5)}
    70%{box-shadow:0 0 0 11px rgba(74,222,128,0)}
    100%{box-shadow:0 0 0 0 rgba(74,222,128,0)}
  }

  .tags{
    margin-top:16px;
    font-size:clamp(11px,1.5vw,14px);
    letter-spacing:.18em;text-transform:uppercase;
    color:var(--faint);
  }
  .tags .sep{opacity:.6;margin:0 .55em}
  .tags a{color:var(--muted);text-decoration:none;transition:color .2s ease}
  .tags a:hover{color:var(--fg)}

  footer{
    position:absolute;left:0;right:0;bottom:24px;z-index:1;
    font-size:12px;letter-spacing:.12em;color:rgba(140,143,150,.6);
    text-transform:uppercase;
  }

  @media (max-width:600px){
    .eyebrow{letter-spacing:.3em}
    .eyebrow::before,.eyebrow::after{width:44px}
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="eyebrow">Portfolio</div>

    <h1>Ray<br>Lunardon</h1>

    <div class="role">Product Designer <span class="sep">·</span> UI/UX Designer</div>

    <div class="divider"></div>

    <div class="tags">
      <a href="mailto:raylunardon@gmail.com">raylunardon@gmail.com</a>
    </div>
  </main>

  <footer>© <span id="y"></span> Ray Lunardon</footer>
  <script>document.getElementById('y').textContent=new Date().getFullYear();</script>
</body>
</html>
